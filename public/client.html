<!DOCTYPE html>
<html lang="ru" style="background:#0a0a14">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Личный кабинет | The Lion's Den Barbershop</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo/logo-main.svg">
  <style>
    html { background: #0a0a14; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c8a85c; --gold-dark: #b8963f; --dark: #1a1a2e; --dark-light: #16213e; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }

    .header { background: var(--dark); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-left a { color: #fff; text-decoration: none; display: flex; align-items: center; gap: 0.75rem; }
    .logo-img { height: 36px; width: auto; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .user-name { font-size: 0.85rem; color: #ccc; }
    .btn-logout { background: none; border: 1px solid #555; color: #ccc; padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: #f66; color: #f66; }
    .client-badge { background: var(--gold); color: var(--dark); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }

    .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center; }
    .stat-card .num { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
    .stat-card .gold { color: var(--gold); }
    .stat-card .label { font-size: 0.7rem; color: #999; margin-top: 0.25rem; }

    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab { padding: 0.6rem 1.25rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: #fff; color: #666; border: 1px solid #eee; transition: all 0.2s; }
    .tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }
    .tab:hover { border-color: var(--gold); }

    .panel { display: none; }
    .panel.active { display: block; }

    .booking-card { background: #fff; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .booking-info { flex: 1; min-width: 200px; }
    .booking-info .service { font-weight: 700; color: var(--dark); font-size: 1rem; }
    .booking-info .details { color: #888; font-size: 0.8rem; margin-top: 0.25rem; line-height: 1.5; }
    .booking-info .details span { display: inline-block; margin-right: 1rem; }
    .booking-actions { display: flex; gap: 0.5rem; align-items: center; }
    .badge { padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 600; }
    .badge-scheduled { background: #dbeafe; color: #1e40af; }
    .badge-completed { background: #d1fae5; color: #065f46; }
    .badge-cancelled { background: #fee2e2; color: #991b1b; }
    .badge-no_show { background: #fef3c7; color: #92400e; }

    .btn-sm { padding: 0.4rem 0.9rem; border: none; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-cancel { background: #fee2e2; color: #991b1b; }
    .btn-cancel:hover { background: #fecaca; }
    .btn-rebook { background: rgba(200,168,92,0.15); color: var(--gold-dark); }
    .btn-rebook:hover { background: rgba(200,168,92,0.25); }
    .btn-book { background: var(--gold); color: var(--dark); padding: 0.6rem 1.5rem; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn-book:hover { background: var(--gold-dark); }

    .empty { text-align: center; padding: 3rem; color: #999; }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* Profile form */
    .profile-card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); max-width: 500px; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 0.3rem; }
    .form-group input { width: 100%; padding: 0.65rem 0.9rem; border: 2px solid #eee; border-radius: 8px; font-size: 0.85rem; outline: none; }
    .form-group input:focus { border-color: var(--gold); }
    .btn-save { background: var(--gold); color: var(--dark); border: none; padding: 0.65rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
    .btn-save:hover { background: var(--gold-dark); }
    .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .msg-ok { background: #d1fae5; color: #065f46; }
    .msg-err { background: #fee2e2; color: #991b1b; }

    .section-title { font-size: 1rem; font-weight: 700; color: var(--dark); margin: 2rem 0 1rem; padding-top: 1rem; border-top: 1px solid #eee; }

    @media (max-width: 600px) {
      .booking-card { flex-direction: column; align-items: flex-start; }
      .booking-actions { width: 100%; justify-content: flex-end; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body style="background:#0a0a14;color:#e0e0e0">
  <header class="header">
    <div class="header-left">
      <a href="/" style="color:#e8c84a;font-weight:700;font-size:1rem;letter-spacing:2px;text-decoration:none">THE LION'S DEN</a>
      <span class="client-badge">КЛИЕНТ</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" onclick="logout()">Выход</button>
    </div>
  </header>

  <div class="container">
    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="num" id="statVisits">—</div><div class="label">Визитов</div></div>
      <div class="stat-card"><div class="num gold" id="statSpent">—</div><div class="label">Потрачено</div></div>
      <div class="stat-card"><div class="num" id="statSaved">—</div><div class="label">Сэкономлено</div></div>
      <div class="stat-card"><div class="num gold" id="statUpcoming">—</div><div class="label">Предстоящих</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="showTab('upcoming')">📅 Предстоящие</div>
      <div class="tab" onclick="showTab('history')">📋 История</div>
      <div class="tab" onclick="showTab('profile')">👤 Профиль</div>
    </div>

    <!-- Upcoming -->
    <div class="panel active" id="panelUpcoming">
      <div id="upcomingList"></div>
    </div>

    <!-- History -->
    <div class="panel" id="panelHistory">
      <div id="historyList"></div>
    </div>

    <!-- Profile -->
    <div class="panel" id="panelProfile">
      <div class="profile-card">
        <h3 style="margin-bottom: 1.5rem; color: var(--dark);">Мой профиль</h3>
        <div class="msg msg-ok" id="profileOk"></div>
        <div class="msg msg-err" id="profileErr"></div>
        <div class="form-group">
          <label>Имя</label>
          <input type="text" id="profName">
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" id="profPhone">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="profEmail" placeholder="Для восстановления пароля">
        </div>
        <button class="btn-save" onclick="saveProfile()">Сохранить</button>

        <div class="section-title">🔒 Смена пароля</div>
        <div class="msg msg-ok" id="pwOk"></div>
        <div class="msg msg-err" id="pwErr"></div>
        <div class="form-group">
          <label>Текущий пароль</label>
          <input type="password" id="pwCurrent">
        </div>
        <div class="form-group">
          <label>Новый пароль</label>
          <input type="password" id="pwNew" placeholder="Минимум 4 символа">
        </div>
        <button class="btn-save" onclick="changePassword()">Сменить пароль</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let token = localStorage.getItem('token');
    let user = null;

    try { user = JSON.parse(localStorage.getItem('user')); } catch(e) {}
    if (!token || !user) { window.location.href = '/login.html'; }

    document.getElementById('userName').textContent = user?.name || '';

    const headers = () => ({
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
    });

    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const tabs = { upcoming: 0, history: 1, profile: 2 };
      document.querySelectorAll('.tab')[tabs[name]].classList.add('active');
      document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    }

    function statusBadge(status) {
      const map = {
        scheduled: ['Запланировано', 'badge-scheduled'],
        completed: ['Выполнено', 'badge-completed'],
        cancelled: ['Отменено', 'badge-cancelled'],
        no_show: ['Неявка', 'badge-no_show'],
      };
      const [text, cls] = map[status] || ['—', ''];
      return `<span class="badge ${cls}">${text}</span>`;
    }

    function formatDate(d) {
      if (!d) return '';
      const parts = d.split('-');
      return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    // Load stats
    async function loadStats() {
      try {
        const res = await fetch(API + '/api/my-stats', { headers: headers() });
        if (!res.ok) return;
        const s = await res.json();
        document.getElementById('statVisits').textContent = s.total_visits;
        document.getElementById('statSpent').textContent = s.total_spent.toLocaleString('ru-RU') + '₽';
        document.getElementById('statSaved').textContent = s.total_saved.toLocaleString('ru-RU') + '₽';
        document.getElementById('statUpcoming').textContent = s.upcoming_bookings;
      } catch(e) {}
    }

    // Load bookings
    async function loadBookings() {
      try {
        const res = await fetch(API + '/api/my-bookings', { headers: headers() });
        if (!res.ok) return;
        const bookings = await res.json();
        const today = new Date().toISOString().split('T')[0];

        const upcoming = bookings.filter(b => b.status === 'scheduled' && b.date >= today);
        const history = bookings.filter(b => b.status !== 'scheduled' || b.date < today);

        renderBookings('upcomingList', upcoming, true);
        renderBookings('historyList', history, false);
      } catch(e) {}
    }

    function renderBookings(containerId, bookings, showCancel) {
      const el = document.getElementById(containerId);
      if (bookings.length === 0) {
        el.innerHTML = `<div class="empty"><div class="icon">${showCancel ? '📅' : '📋'}</div><p>${showCancel ? 'Нет предстоящих записей' : 'История пуста'}</p>${showCancel ? '<br><a href="/" class="btn-book">Записаться</a>' : ''}</div>`;
        return;
      }

      el.innerHTML = bookings.map(b => `
        <div class="booking-card">
          <div class="booking-info">
            <div class="service">${b.service_name || b.service}</div>
            <div class="details">
              <span>📅 ${formatDate(b.date)}</span>
              <span>🕐 ${b.time}</span>
              <span>💈 ${b.barber_name || b.master}</span>
              <span>💰 ${b.price_final || '—'}₽</span>
            </div>
          </div>
          <div class="booking-actions">
            ${statusBadge(b.status)}
            ${showCancel && b.status === 'scheduled' ? `<button class="btn-sm btn-cancel" onclick="cancelBooking('${b.id}')">Отменить</button>` : ''}
            ${!showCancel && (b.status === 'completed' || b.status === 'cancelled') ? `<button class="btn-sm btn-rebook" onclick="rebook('${b.id}')">Повторить</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function cancelBooking(id) {
      if (!confirm('Отменить запись?')) return;
      try {
        const res = await fetch(API + '/api/my-bookings/' + id + '/cancel', { method: 'POST', headers: headers() });
        const data = await res.json();
        if (!res.ok) { alert(data.error); return; }
        loadBookings();
        loadStats();
      } catch(e) { alert('Ошибка'); }
    }

    function rebook(id) {
      // Redirect to main page booking
      alert('Функция "Повторить" — выберите дату и время на главной странице.');
      window.location.href = '/#booking';
    }

    // Profile
    async function loadProfile() {
      try {
        const res = await fetch(API + '/api/me', { headers: headers() });
        if (!res.ok) return;
        const u = await res.json();
        document.getElementById('profName').value = u.name || '';
        document.getElementById('profPhone').value = u.phone || '';
        document.getElementById('profEmail').value = u.email || '';
      } catch(e) {}
    }

    async function saveProfile() {
      const name = document.getElementById('profName').value.trim();
      const phone = document.getElementById('profPhone').value.trim();
      const email = document.getElementById('profEmail').value.trim();
      const ok = document.getElementById('profileOk');
      const err = document.getElementById('profileErr');
      ok.style.display = 'none'; err.style.display = 'none';

      try {
        const res = await fetch(API + '/api/me', {
          method: 'PATCH',
          headers: headers(),
          body: JSON.stringify({ name, phone, email }),
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
        ok.textContent = 'Профиль сохранён'; ok.style.display = 'block';
        // Update stored user
        user.name = data.name;
        user.phone = data.phone;
        user.email = data.email;
        localStorage.setItem('user', JSON.stringify(user));
        document.getElementById('userName').textContent = data.name;
      } catch(e) { err.textContent = 'Ошибка'; err.style.display = 'block'; }
    }

    async function changePassword() {
      const current = document.getElementById('pwCurrent').value;
      const newPw = document.getElementById('pwNew').value;
      const ok = document.getElementById('pwOk');
      const err = document.getElementById('pwErr');
      ok.style.display = 'none'; err.style.display = 'none';

      if (!current || !newPw) { err.textContent = 'Заполните оба поля'; err.style.display = 'block'; return; }
      if (newPw.length < 4) { err.textContent = 'Минимум 4 символа'; err.style.display = 'block'; return; }

      try {
        const res = await fetch(API + '/api/me/password', {
          method: 'PATCH',
          headers: headers(),
          body: JSON.stringify({ current_password: current, new_password: newPw }),
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
        ok.textContent = 'Пароль изменён'; ok.style.display = 'block';
        document.getElementById('pwCurrent').value = '';
        document.getElementById('pwNew').value = '';
      } catch(e) { err.textContent = 'Ошибка'; err.style.display = 'block'; }
    }

    function logout() {
      fetch(API + '/api/logout', { method: 'POST', headers: headers() }).catch(() => {});
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    // Init
    loadStats();
    loadBookings();
    loadProfile();
  </script>
</body>
</html>
