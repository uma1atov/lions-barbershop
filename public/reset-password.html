<!DOCTYPE html>
<html lang="ru" style="background:#0a0a14">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Восстановление пароля | The Lion's Den Barbershop</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo/logo-main.svg">
  <style>
    html { background: #0a0a14; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c8a85c; --gold-dark: #b8963f; --dark: #1a1a2e; --dark-light: #16213e; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: var(--dark); padding: 1rem 1.5rem; border-bottom: 1px solid #2a2a3e; }
    .header a { color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 0.75rem; }
    .logo-img { height: 36px; width: auto; object-fit: contain; }
    .logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .card h2 { font-size: 1.3rem; color: var(--dark); margin-bottom: 0.5rem; }
    .card .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2rem; line-height: 1.5; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 0.4rem; font-weight: 500; }
    .field input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; outline: none; transition: border 0.2s; }
    .field input:focus { border-color: var(--gold); }
    .btn { width: 100%; padding: 0.85rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--gold); color: var(--dark); }
    .btn-primary:hover { background: var(--gold-dark); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { background: #fee; color: #c00; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .success { background: #efe; color: #060; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .info { background: #e8f4fd; color: #0369a1; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .back-link { text-align: center; margin-top: 1.5rem; }
    .back-link a { color: var(--gold); font-size: 0.85rem; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .step { display: none; }
    .step.active { display: block; }
    .otp-input { letter-spacing: 8px; text-align: center; font-size: 1.5rem; font-weight: 700; }
    .attempts-left { font-size: 0.75rem; color: #888; text-align: center; margin-top: 0.5rem; }
    .resend-link { text-align: center; margin-top: 1rem; }
    .resend-link a { color: var(--gold); font-size: 0.8rem; cursor: pointer; text-decoration: none; }
    .resend-link a:hover { text-decoration: underline; }
    .resend-link a.disabled { color: #ccc; pointer-events: none; }
  </style>
</head>
<body style="background:#0a0a14;color:#e0e0e0">
  <div class="header">
    <a href="/">
      <span class="logo-text">THE LION'S DEN</span>
    </a>
  </div>

  <div class="main">
    <div class="card">
      <!-- STEP 1: Enter email -->
      <div class="step active" id="step1">
        <h2>🔐 Восстановление пароля</h2>
        <p class="subtitle">Введите email, указанный при регистрации. Мы отправим код для восстановления.</p>
        <div class="error" id="step1Error"></div>
        <div class="success" id="step1Success"></div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="resetEmail" placeholder="your@email.com">
        </div>
        <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()">Отправить код</button>
      </div>

      <!-- STEP 2: Enter OTP + new password -->
      <div class="step" id="step2">
        <h2>📧 Введите код</h2>
        <p class="subtitle">Мы отправили 6-значный код на <strong id="emailDisplay"></strong></p>
        <div class="error" id="step2Error"></div>
        <div class="success" id="step2Success"></div>
        <div class="info" id="step2Info"></div>
        <div class="field">
          <label>Код из email</label>
          <input type="text" id="otpCode" class="otp-input" placeholder="______" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        </div>
        <div class="field">
          <label>Новый пароль</label>
          <input type="password" id="newPassword" placeholder="Минимум 4 символа">
        </div>
        <div class="field">
          <label>Повторите пароль</label>
          <input type="password" id="confirmPassword" placeholder="Повторите новый пароль">
        </div>
        <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">Сменить пароль</button>
        <div class="resend-link">
          <a id="resendLink" onclick="resendCode()">Отправить код повторно</a>
        </div>
      </div>

      <!-- STEP 3: Success -->
      <div class="step" id="step3">
        <div style="text-align: center; padding: 1rem 0;">
          <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
          <h2>Пароль изменён!</h2>
          <p class="subtitle">Теперь войдите с новым паролем.</p>
          <a href="/login.html" class="btn btn-primary" style="display: inline-block; text-decoration: none; margin-top: 1rem;">Войти</a>
        </div>
      </div>

      <div class="back-link"><a href="/login.html">← Вернуться к входу</a></div>
    </div>
  </div>

  <script>
    let savedEmail = '';
    let resendTimer = 0;

    function showStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
    }

    async function sendCode() {
      const email = document.getElementById('resetEmail').value.trim();
      const err = document.getElementById('step1Error');
      const success = document.getElementById('step1Success');
      const btn = document.getElementById('sendCodeBtn');
      err.style.display = 'none';
      success.style.display = 'none';

      if (!email) { err.textContent = 'Введите email'; err.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Отправка...';

      try {
        const res = await fetch('/api/password-reset/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error;
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Отправить код';
          return;
        }

        savedEmail = email;
        document.getElementById('emailDisplay').textContent = email;
        showStep(2);
        startResendTimer();
      } catch (e) {
        err.textContent = 'Ошибка соединения';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Отправить код';
      }
    }

    async function verifyCode() {
      const code = document.getElementById('otpCode').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const err = document.getElementById('step2Error');
      const info = document.getElementById('step2Info');
      const btn = document.getElementById('verifyBtn');
      err.style.display = 'none';
      info.style.display = 'none';

      if (!code || code.length !== 6) { err.textContent = 'Введите 6-значный код'; err.style.display = 'block'; return; }
      if (!newPassword) { err.textContent = 'Введите новый пароль'; err.style.display = 'block'; return; }
      if (newPassword.length < 4) { err.textContent = 'Пароль минимум 4 символа'; err.style.display = 'block'; return; }
      if (newPassword !== confirmPassword) { err.textContent = 'Пароли не совпадают'; err.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Проверка...';

      try {
        const res = await fetch('/api/password-reset/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: savedEmail, code, new_password: newPassword }),
        });
        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error;
          err.style.display = 'block';
          if (data.attempts_left !== undefined) {
            info.textContent = `Осталось попыток: ${data.attempts_left}`;
            info.style.display = 'block';
          }
          btn.disabled = false;
          btn.textContent = 'Сменить пароль';
          return;
        }

        showStep(3);
      } catch (e) {
        err.textContent = 'Ошибка соединения';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Сменить пароль';
      }
    }

    function startResendTimer() {
      resendTimer = 60;
      const link = document.getElementById('resendLink');
      link.classList.add('disabled');

      const interval = setInterval(() => {
        resendTimer--;
        link.textContent = `Отправить повторно (${resendTimer}с)`;
        if (resendTimer <= 0) {
          clearInterval(interval);
          link.textContent = 'Отправить код повторно';
          link.classList.remove('disabled');
        }
      }, 1000);
    }

    async function resendCode() {
      if (resendTimer > 0) return;
      const err = document.getElementById('step2Error');
      err.style.display = 'none';

      try {
        const res = await fetch('/api/password-reset/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: savedEmail }),
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error;
          err.style.display = 'block';
          return;
        }
        startResendTimer();
        const info = document.getElementById('step2Info');
        info.textContent = 'Новый код отправлен';
        info.style.display = 'block';
      } catch (e) {
        err.textContent = 'Ошибка соединения';
        err.style.display = 'block';
      }
    }

    // Auto-focus and Enter key
    document.getElementById('resetEmail').addEventListener('keydown', e => { if (e.key === 'Enter') sendCode(); });
    document.getElementById('otpCode').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('newPassword').focus(); });
    document.getElementById('confirmPassword').addEventListener('keydown', e => { if (e.key === 'Enter') verifyCode(); });
  </script>
</body>
</html>
